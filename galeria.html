            <div class="page-hero-content">
                <p class="page-hero-breadcrumb">
                    <a href="index.html">Inicio</a>

<!-- GALERÍA DE FOTOS -->
<section class="galeria-section py-5">
    <div class="container">

        <!-- FILTROS -->
        <div class="galeria-filtros text-center mb-5">
            <button type="button" class="galeria-filtro-btn active" data-filtro="all">General</button>
            <button type="button" class="galeria-filtro-btn" data-filtro="capuccinos">Capuccinos</button>
            <button type="button" class="galeria-filtro-btn" data-filtro="lattes">Lattes</button>
            <button type="button" class="galeria-filtro-btn" data-filtro="postres">Postres</button>
            <button type="button" class="galeria-filtro-btn" data-filtro="bebidas-frias">Bebidas Frías</button>
            <button type="button" class="galeria-filtro-btn" data-filtro="ambiente">Ambiente</button>
        </div>

        <!-- CUADRÍCULA -->
        <div class="row g-4 galeria-grid">

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="capuccinos">
                <div class="galeria-foto" data-nombre="Capuccino Clásico">
                    <img src="capuccinos.png" alt="Capuccino Clásico">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="capuccinos">
                <div class="galeria-foto" data-nombre="Capuccino con Arte Latte">
                    <img src="capuccinos2.png" alt="Capuccino con Arte Latte">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="capuccinos">
                <div class="galeria-foto" data-nombre="Capuccino Especial">
                    <img src="capuccinos3.png" alt="Capuccino Especial">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="lattes">
                <div class="galeria-foto" data-nombre="Latte Artesanal">
                    <img src="lattes1.png" alt="Latte Artesanal">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="lattes">
                <div class="galeria-foto" data-nombre="Latte de la Casa">
                    <img src="lattes5.png" alt="Latte de la Casa">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="postres">
                <div class="galeria-foto" data-nombre="Postre Artesanal">
                    <img src="postre1.png" alt="Postre Artesanal">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="postres">
                <div class="galeria-foto" data-nombre="Repostería del Día">
                    <img src="postre2.png" alt="Repostería del Día">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="postres">
                <div class="galeria-foto" data-nombre="Dulce Especialidad">
                    <img src="postre3.png" alt="Dulce Especialidad">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="bebidas-frias">
                <div class="galeria-foto" data-nombre="Bebida Fría Refrescante">
                    <img src="bebidafria1.png" alt="Bebida Fría Refrescante">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="bebidas-frias">
                <div class="galeria-foto" data-nombre="Frappé de la Casa">
                    <img src="bebidafria2.png" alt="Frappé de la Casa">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="bebidas-frias">
                <div class="galeria-foto" data-nombre="Café Helado">
                    <img src="bebidafria3.png" alt="Café Helado">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="bebidas-frias">
                <div class="galeria-foto" data-nombre="Bebida Fría Especial">
                    <img src="bebidafria6.png" alt="Bebida Fría Especial">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="ambiente">
                <div class="galeria-foto" data-nombre="Nuestro Espacio">
                    <img src="ambiente1.png" alt="Nuestro Espacio">
                </div>
            </div>

            <div class="col-sm-6 col-lg-4 galeria-item" data-categoria="ambiente">

                </div>

<!-- MODAL / LIGHTBOX -->
<div class="modal fade" id="galeriaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content galeria-modal-content">
            <button type="button" class="btn-close galeria-modal-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            <img src="" id="galeriaModalImg" class="galeria-modal-img" alt="">
            <p id="galeriaModalNombre" class="galeria-modal-nombre"></p>
        </div>
    </div>
</div>
